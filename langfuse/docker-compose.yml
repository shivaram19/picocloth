# Langfuse Self-Hosted for PicoCloth Fleet Observability
# Based on: https://langfuse.com/docs/deployment/self-host
# Stack: Web + Worker + Postgres + ClickHouse + Redis + MinIO

version: "3.8"

services:
  langfuse-web:
    image: langfuse/langfuse:latest
    container_name: picocloth-langfuse-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/langfuse
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=picocloth
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-picocloth-nextauth-secret-64-chars-long-change-me-in-production}
      - SALT=${SALT:-picocloth-salt-32-chars-long-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-c2dd321455d423cf1ec63fdea53359f9556c1f567340ae211fe2cfb120129332}
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - TELEMETRY_ENABLED=false
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=minio123
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - picocloth-observability
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:latest
    container_name: picocloth-langfuse-worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/langfuse
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=picocloth
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-picocloth-nextauth-secret-64-chars-long-change-me-in-production}
      - SALT=${SALT:-picocloth-salt-32-chars-long-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-c2dd321455d423cf1ec63fdea53359f9556c1f567340ae211fe2cfb120129332}
      - TELEMETRY_ENABLED=false
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=minio123
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - picocloth-observability
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: picocloth-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - picocloth-observability
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: picocloth-clickhouse
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=picocloth
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - picocloth-observability
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: picocloth-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - picocloth-observability
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: picocloth-minio
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - picocloth-observability
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  minio_data:

networks:
  picocloth-observability:
    driver: bridge
