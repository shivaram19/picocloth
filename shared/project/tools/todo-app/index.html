
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicoCloth Fleet Todo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #e94560;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            font-weight: 300;
        }
        .input-section {
            display: flex;
            margin-bottom: 2rem;
            gap: 1rem;
        }
        #taskInput {
            flex: 1;
            padding: 1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 1.1rem;
        }
        #taskInput::placeholder {
            color: #888;
        }
        #addBtn {
            padding: 1rem 2rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: background 0.3s;
        }
        #addBtn:hover {
            background: #d83f54;
        }
        .filter-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .filter-btn {
            padding: 0.5rem 1.5rem;
            background: #16213e;
            color: #e0e0e0;
            border: 2px solid #333;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn.active {
            background: #e94560;
            border-color: #e94560;
        }
        .todo-list {
            list-style: none;
        }
        .todo-item {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: #16213e;
            border-radius: 12px;
            border-left: 4px solid #e94560;
            transition: all 0.3s;
        }
        .todo-item.completed {
            opacity: 0.6;
            border-left-color: #4ecdc4;
        }
        .todo-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 1rem;
            cursor: pointer;
            accent-color: #e94560;
        }
        .todo-text {
            flex: 1;
            font-size: 1.2rem;
            text-decoration: line-through;
            color: #888;
        }
        .todo-item.completed .todo-text {
            text-decoration: line-through;
        }
        .delete-btn {
            padding: 0.5rem 1rem;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .delete-btn:hover {
            background: #ff5252;
        }
        .stats {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            background: #16213e;
            border-radius: 12px;
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .input-section {
                flex-direction: column;
            }
            .filter-section {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PicoCloth Fleet Todo</h1>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new fleet task..." maxlength="100">
            <button id="addBtn">Add Task</button>
        </div>
        
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="done">Done</button>
        </div>
        
        <ul class="todo-list" id="todoList"></ul>
        
        <div class="stats" id="stats">
            <span id="totalCount">0</span> tasks total | 
            <span id="activeCount">0</span> active | 
            <span id="doneCount">0</span> done
        </div>
    </div>

    <script>
        class TodoApp {
            constructor() {
                this.todos = JSON.parse(localStorage.getItem('picocloth-todos')) || [
                    { id: Date.now() - 3, text: 'Deploy new fleet node for redundancy', completed: false },
                    { id: Date.now() - 2, text: 'Monitor digital twin archive sync status', completed: true },
                    { id: Date.now() - 1, text: 'Schedule shared memory backup rotation', completed: false }
                ];
                this.currentFilter = 'all';
                this.init();
            }

            init() {
                this.bindEvents();
                this.render();
            }

            bindEvents() {
                document.getElementById('addBtn').addEventListener('click', () => this.addTodo());
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTodo();
                });
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.setFilter(e.target.dataset.filter));
                });
            }

            addTodo() {
                const input = document.getElementById('taskInput');
                const text = input.value.trim();
                if (text) {
                    this.todos.unshift({
                        id: Date.now(),
                        text,
                        completed: false
                    });
                    input.value = '';
                    this.save();
                    this.render();
                }
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(todo => todo.id !== id);
                this.save();
                this.render();
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.save();
                    this.render();
                }
            }

            setFilter(filter) {
                this.currentFilter = filter;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === filter);
                });
                this.render();
            }

            getFilteredTodos() {
                switch (this.currentFilter) {
                    case 'active': return this.todos.filter(todo => !todo.completed);
                    case 'done': return this.todos.filter(todo => todo.completed);
                    default: return this.todos;
                }
            }

            render() {
                const todoList = document.getElementById('todoList');
                const filteredTodos = this.getFilteredTodos();
                
                todoList.innerHTML = filteredTodos.map(todo => `
                    <li class="todo-item ${todo.completed ? 'completed' : ''}">
                        <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} 
                               onchange="app.toggleTodo(${todo.id})">
                        <span class="todo-text">${this.escapeHtml(todo.text)}</span>
                        <button class="delete-btn" onclick="app.deleteTodo(${todo.id})">Delete</button>
                    </li>
                `).join('');

                this.updateStats();
            }

            updateStats() {
                const total = this.todos.length;
                const active = this.todos.filter(t => !t.completed).length;
                const done = total - active;
                
                document.getElementById('totalCount').textContent = total;
                document.getElementById('activeCount').textContent = active;
                document.getElementById('doneCount').textContent = done;
            }

            save() {
                localStorage.setItem('picocloth-todos', JSON.stringify(this.todos));
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        const app = new TodoApp();
    </script>
</body>
</html>
